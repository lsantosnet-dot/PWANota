<!DOCTYPE html>
<html>

<head>
    <title>Generate PWA Icons</title>
</head>

<body>
    <h2>PWA Icon Generator</h2>
    <canvas id="c192" width="192" height="192"></canvas>
    <canvas id="c512" width="512" height="512"></canvas>
    <br>
    <a id="dl192" download="icon-192.png">Download 192px</a> |
    <a id="dl512" download="icon-512.png">Download 512px</a>
    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            const s = size / 512; // scale factor

            // Background
            const r = 100 * s;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, r);
            ctx.fillStyle = '#1a1a2e';
            ctx.fill();

            // Gradient
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#818cf8');
            grad.addColorStop(1, '#c084fc');

            // Card 1 (behind, rotated)
            ctx.save();
            ctx.translate(size / 2, size / 2);
            ctx.rotate(-6 * Math.PI / 180);
            ctx.translate(-size / 2, -size / 2);
            ctx.beginPath();
            ctx.roundRect(110 * s, 148 * s, 292 * s, 216 * s, 28 * s);
            ctx.strokeStyle = grad;
            ctx.lineWidth = 8 * s;
            ctx.globalAlpha = 0.3;
            ctx.stroke();
            ctx.restore();

            // Card 2 (middle, slight rotation)
            ctx.save();
            ctx.translate(size / 2, size / 2);
            ctx.rotate(-2 * Math.PI / 180);
            ctx.translate(-size / 2, -size / 2);
            ctx.beginPath();
            ctx.roundRect(110 * s, 148 * s, 292 * s, 216 * s, 28 * s);
            ctx.strokeStyle = grad;
            ctx.lineWidth = 8 * s;
            ctx.globalAlpha = 0.6;
            ctx.stroke();
            ctx.restore();

            // Card 3 (front)
            ctx.globalAlpha = 1;
            ctx.beginPath();
            ctx.roundRect(110 * s, 148 * s, 292 * s, 216 * s, 28 * s);
            ctx.fillStyle = '#1a1a2e';
            ctx.fill();
            ctx.strokeStyle = grad;
            ctx.lineWidth = 8 * s;
            ctx.stroke();

            // Lines
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#818cf8';

            ctx.globalAlpha = 0.7;
            ctx.lineWidth = 10 * s;
            ctx.beginPath();
            ctx.moveTo(156 * s, 208 * s);
            ctx.lineTo(356 * s, 208 * s);
            ctx.stroke();

            ctx.globalAlpha = 0.45;
            ctx.lineWidth = 8 * s;
            ctx.beginPath();
            ctx.moveTo(156 * s, 248 * s);
            ctx.lineTo(300 * s, 248 * s);
            ctx.stroke();

            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.moveTo(156 * s, 282 * s);
            ctx.lineTo(260 * s, 282 * s);
            ctx.stroke();

            // Play button circle
            ctx.globalAlpha = 0.9;
            ctx.beginPath();
            ctx.arc(358 * s, 318 * s, 48 * s, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Play triangle
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.moveTo(345 * s, 294 * s);
            ctx.lineTo(345 * s, 342 * s);
            ctx.lineTo(385 * s, 318 * s);
            ctx.closePath();
            ctx.fill();
        }

        const c192 = document.getElementById('c192');
        const c512 = document.getElementById('c512');
        drawIcon(c192, 192);
        drawIcon(c512, 512);

        document.getElementById('dl192').href = c192.toDataURL('image/png');
        document.getElementById('dl512').href = c512.toDataURL('image/png');

        // Auto-show the data URLs for easy copying
        console.log('192 data URL length:', c192.toDataURL('image/png').length);
        console.log('512 data URL length:', c512.toDataURL('image/png').length);
    </script>
</body>

</html>
